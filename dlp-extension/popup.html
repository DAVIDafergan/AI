<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DLP Shield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      min-height: 380px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
    }

    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #1e293b 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #334155;
    }

    .header-icon { font-size: 24px; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .header-text p {
      font-size: 11px;
      color: #94a3b8;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }

    .status-dot.connected { background: #22c55e; }

    .content { padding: 16px; }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-label { color: #94a3b8; font-size: 12px; }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #60a5fa;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
    }

    .toggle-label { font-size: 13px; color: #e2e8f0; }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #334155;
      border-radius: 22px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      background: #94a3b8;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #2563eb; }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    .field-group { margin-bottom: 12px; }

    .field-group label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .field-row { display: flex; gap: 6px; }

    .field-row input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 6px 10px;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
    }

    .field-row input:focus { border-color: #3b82f6; }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary { background: #2563eb; color: #fff; }

    .btn-secondary {
      background: #334155;
      color: #cbd5e1;
      width: 100%;
      padding: 8px;
      margin-top: 4px;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: center;
    }

    #save-msg {
      font-size: 11px;
      color: #22c55e;
      text-align: center;
      min-height: 16px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🛡️</span>
    <div class="header-text">
      <h1>DLP Shield</h1>
      <p>הגנה על מידע רגיש ב-AI</p>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">בודק חיבור...</span>
  </div>

  <div class="content">
    <div class="stat-card">
      <span class="stat-label">פריטים שוחזרו בסשן</span>
      <span class="stat-value" id="restored-count">0</span>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">הפעל הגנה</span>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="field-group">
      <label>כתובת שרת DLP</label>
      <div class="field-row">
        <input type="text" id="server-url" value="http://localhost:3000" placeholder="http://localhost:3000" />
        <button class="btn btn-primary" id="save-btn">שמור</button>
      </div>
      <div id="save-msg"></div>
    </div>

    <button class="btn btn-secondary" id="clear-btn">🗑️ נקה מטמון</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
