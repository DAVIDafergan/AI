services:
  # ── GhostLayer Portal (Next.js 14) ──────────────────────────────────────────
  ghostlayer-portal:
    build:
      context: ./dlp-server
      dockerfile: Dockerfile
    container_name: ghostlayer-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # External Railway MongoDB – override with MONGODB_URI env var if needed
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:CJIYYeWjRwoQChiJPyxBjQGbqbsfgQeu@ballast.proxy.rlwy.net:56402}
      SUPER_ADMIN_KEY: ${SUPER_ADMIN_KEY}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      DLP_SERVER_URL: ${DLP_SERVER_URL:-http://localhost:3000}
      DLP_DEFAULT_ORG: ${DLP_DEFAULT_ORG:-default-org}
      DLP_ADMIN_SECRET: ${DLP_ADMIN_SECRET:-change-me-in-production}
      DLP_API_KEY: ${DLP_API_KEY:-dev-api-key-12345}
      DLP_VERBOSE: ${DLP_VERBOSE:-false}
    depends_on:
      - mongo
      - redis
      - qdrant
    networks:
      - ghostlayer-net

  # ── MongoDB – multi-tenant data store ───────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: ghostlayer-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - ghostlayer-net

  # ── Redis – local agent caching ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ghostlayer-redis
    restart: unless-stopped
    networks:
      - ghostlayer-net

  # ── Qdrant – local vector database ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: ghostlayer-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ghostlayer-net

volumes:
  qdrant_storage:
  mongo_data:

networks:
  ghostlayer-net:
    driver: bridge
